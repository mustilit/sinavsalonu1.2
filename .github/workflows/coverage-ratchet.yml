name: Coverage Ratchet

# Coverage threshold'larını main branch ölçümüne göre otomatik sıkıştırır.
# Çalışma sırası:
#   1. main branch tüm test'leri --coverage ile koşar
#   2. scripts/coverage-ratchet.js threshold'ları hesaplar
#   3. Değişiklik varsa PR açar (admin onaylayıp merge eder)
#
# Tetikleyiciler:
#   - Cron: her Pazartesi 06:00 UTC (haftalık)
#   - Manuel: workflow_dispatch (release sonrası, sprint sonu)
#   - Push: main'e push olduğunda DEĞİL — sürekli koşmasın

on:
  workflow_dispatch:
    inputs:
      buffer:
        description: 'CI tampon (puan)'
        required: false
        default: '2'
  schedule:
    # Pazartesi 06:00 UTC → 09:00 Türkiye
    - cron: '0 6 * * 1'

jobs:
  ratchet:
    name: Coverage threshold ratchet
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend deps
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Run tests with coverage
        working-directory: apps/backend
        run: npm test -- --coverage --runInBand
        env:
          # Test DB için minimum env — Jest setup'ı InMemory repo'ları kullanır
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret-for-ci-only

      - name: Run ratchet (dry-run + apply)
        working-directory: apps/backend
        run: |
          # Önce dry-run (rapor görünür)
          node scripts/coverage-ratchet.js --buffer=${{ inputs.buffer || 2 }}
          # Sonra apply
          node scripts/coverage-ratchet.js --buffer=${{ inputs.buffer || 2 }} --apply

      - name: Diff kontrolü
        id: diff
        working-directory: apps/backend
        run: |
          if git diff --quiet jest.config.cjs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Hiçbir threshold değişmedi."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Threshold değişiklikleri:"
            git diff jest.config.cjs
          fi

      - name: PR aç (değişiklik varsa)
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/coverage-ratchet
          delete-branch: true
          commit-message: |
            chore(coverage): otomatik threshold ratchet

            Coverage Ratchet workflow tarafından otomatik üretildi.
            Mevcut main branch ölçümünden +2pt tampon ile.
          title: 'chore(coverage): threshold ratchet — kademeli sıkıştırma'
          body: |
            ## Coverage Threshold Ratchet

            Bu PR `scripts/coverage-ratchet.js` tarafından otomatik üretildi.

            **Mantık:**
            - Mevcut main branch'in coverage ölçümünü oku (`coverage-summary.json`)
            - Her path için `proposed = floor(measured - buffer)` hesapla
            - Yeni değer eski threshold'dan ≥1pt yüksekse uygula (ratchet — sadece yukarı)

            **Tampon:** `${{ inputs.buffer || 2 }}` puan (branches için +1 ekstra)

            **Review için:**
            - Aşağıdaki diff'i kontrol et — beklenmedik düşüş VAR MI?
            - PR'da test fail varsa, threshold çok agresif olabilir → `--buffer=3` ile yeniden çalıştır
            - Yeşilse merge et

            ---
            🤖 Generated by `.github/workflows/coverage-ratchet.yml`
          labels: |
            chore
            coverage
            automated
